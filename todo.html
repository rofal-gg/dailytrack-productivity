<!-- FILE: todo.html -->
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do - DailyTrack</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="navbar-inner">
    <a href="dashboard.html" class="brand">📅 DailyTrack</a>
    <nav class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="jadwal.html" class="nav-link">Jadwal</a>
      <a href="todo.html" class="nav-link active">To-Do</a>
    </nav>
    <div class="navbar-actions">
      <button id="btnExportCsv" class="btn btn-secondary">Export CSV</button>
      <button id="btnReset" class="btn btn-danger">Reset</button>
    </div>
  </div>
</header>

<main class="page-container">
  <div class="page-header">
    <h1>✅ To-Do List</h1>
    <div class="page-header-actions">
      <button id="btnAddTodo" class="btn btn-primary">+ Tambah To-Do</button>
    </div>
  </div>

  <section class="panel">
    <div class="progress-wrapper">
      <div class="progress-info">
        <span id="progressLabel">0% Selesai</span>
        <span id="progressFraction">0/0</span>
      </div>
      <div class="progress-bar-track">
        <div id="progressBarFill" class="progress-bar-fill"></div>
      </div>
    </div>
    <div id="todoList"></div>
  </section>
</main>

<!-- Modal: Tambah To-Do -->
<div id="modalTodo" class="modal-overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3>Tambah To-Do</h3>
      <button type="button" class="modal-close" data-close-modal="modalTodo">&times;</button>
    </div>
    <form id="formTodo" class="modal-body">
      <div class="form-group">
        <label for="todoName">Nama Tugas</label>
        <input type="text" id="todoName" required placeholder="Contoh: Kerjakan Laporan">
      </div>
      <div class="form-group">
        <label for="todoDate">Tanggal Target</label>
        <input type="date" id="todoDate" required>
      </div>
      <div class="form-group">
        <label for="todoPriority">Prioritas</label>
        <select id="todoPriority" required></select>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" data-close-modal="modalTodo">Batal</button>
        <button type="submit" class="btn btn-primary">Simpan To-Do</button>
      </div>
    </form>
  </div>
</div>

<footer class="app-footer">

</footer>

<script type="module" src="todo.js"></script>
</body>
</html>
